<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>基础资料</title><link rel="stylesheet" href="../style.css"></head><body>
<div class="top"><a href="../index.html">← 首页</a>基础资料</div>
<div class="wrap">
  <div class="card">
    <h2>客户主数据</h2>
    <table><thead><tr><th>客户编码</th><th>客户名称</th><th>币种</th><th>国家</th></tr></thead><tbody><tr>
      <td><input id="customer_code"></td><td><input id="customer_name"></td><td><input id="currency" value="USD"></td><td><input id="country" value="US"></td>
    </tr></tbody></table>
    <div class="actions"><button onclick="saveCustomer()">保存客户</button><button class="secondary" onclick="loadCustomers()">刷新客户列表</button></div>
    <div id="customersTable"></div>
  </div>

  <div class="card">
    <h2>商品主数据</h2>
    <table><thead><tr><th>SKU</th><th>类别</th><th>类别HS</th><th>颜色</th><th>尺寸</th><th>装箱数</th><th>长</th><th>宽</th><th>高</th><th>毛重</th><th>净重</th><th>客户HS</th><th>报关中文名</th></tr></thead>
    <tbody><tr>
      <td><input id="sku"></td><td><input id="category_name"></td><td><input id="category_hs_code"></td><td><input id="color"></td><td><input id="size"></td>
      <td><input id="pack" type="number"></td><td><input id="len" type="number" step="0.01"></td><td><input id="wid" type="number" step="0.01"></td><td><input id="hei" type="number" step="0.01"></td>
      <td><input id="gross" type="number" step="0.01"></td><td><input id="net" type="number" step="0.01"></td><td><input id="customer_hs_code"></td><td><input id="customs_cn_name"></td>
    </tr></tbody></table>
    <div class="actions"><button onclick="saveProduct()">保存商品</button><button class="secondary" onclick="loadProducts()">刷新商品列表</button></div>
    <div id="productsTable"></div>
  </div>

  <div class="card"><h2>接口结果</h2><pre id="result">等待操作...</pre></div>
</div>
<script src="../app.js"></script>
<script>
const {api,renderTable}=window.WM;
function v(id){return document.getElementById(id).value.trim()}
function n(id){return Number(document.getElementById(id).value)}
async function saveCustomer(){await api('/api/customers',{method:'POST',body:JSON.stringify({customer_code:v('customer_code'),customer_name:v('customer_name'),currency:v('currency'),country:v('country')})});await loadCustomers();}
async function saveProduct(){await api('/api/products',{method:'POST',body:JSON.stringify({sku:v('sku'),category_name:v('category_name'),category_hs_code:v('category_hs_code'),color:v('color'),size:v('size'),default_packing_qty:n('pack'),carton_length_cm:n('len'),carton_width_cm:n('wid'),carton_height_cm:n('hei'),standard_gross_weight_kg:n('gross'),standard_net_weight_kg:n('net'),customer_hs_code:v('customer_hs_code'),customs_cn_name:v('customs_cn_name')})});await loadProducts();}
async function loadCustomers(){const rows=await api('/api/customers');renderTable('customersTable',['id','customer_code','customer_name','currency','country'],rows)}
async function loadProducts(){const rows=await api('/api/products');renderTable('productsTable',['sku','category_name','color','size','default_packing_qty','customer_hs_code'],rows)}
loadCustomers();loadProducts();
</script>
</body></html>
